apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: manual-sc
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sc-pv
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: manual-sc
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/k8s-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sc-pvc
spec:
  storageClassName: manual-sc
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange-sc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange-sc
  template:
    metadata:
      labels:
        app: data-exchange-sc
    spec:
      containers:
      - name: busybox
        image: busybox
        command:
          - /bin/sh
          - -c
        args:
          - |
            while true
            do
              echo "$(date)" >> /shared/data.txt
              sleep 5
            done
        volumeMounts:
        - name: storage
          mountPath: /shared

      - name: multitool
        image: wbitt/network-multitool
        command:
          - /bin/sh
          - -c
        args:
          - tail -f /shared/data.txt
        volumeMounts:
        - name: storage
          mountPath: /shared

      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: sc-pvc
